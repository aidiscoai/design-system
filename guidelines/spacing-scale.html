<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing Scale" subtitle="8px base grid — 4 / 8 / 12 / 16 / 24 / 32 / 48 / 64" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--midnight-black); font-family: var(--font-mono); }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .blk { background: var(--gradient-signal); border-radius: var(--radius-xs); width: 28px; }
  .lbl { font-size: 11px; color: var(--cool-gray); }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="blk" style="height:4px"></div><span class="lbl">4</span></div>
    <div class="col"><div class="blk" style="height:8px"></div><span class="lbl">8</span></div>
    <div class="col"><div class="blk" style="height:12px"></div><span class="lbl">12</span></div>
    <div class="col"><div class="blk" style="height:16px"></div><span class="lbl">16</span></div>
    <div class="col"><div class="blk" style="height:24px"></div><span class="lbl">24</span></div>
    <div class="col"><div class="blk" style="height:32px"></div><span class="lbl">32</span></div>
    <div class="col"><div class="blk" style="height:48px"></div><span class="lbl">48</span></div>
    <div class="col"><div class="blk" style="height:64px"></div><span class="lbl">64</span></div>
  </div>
</body>
</html>
