<!-- @dsCard group="Colors" viewport="700x180" name="Core Base — the dark stage" subtitle="Midnight Black, Deep Indigo, Deep Slate" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 20px; background: #000; font-family: var(--font-body); }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; border-radius: var(--radius-md); padding: 14px; height: 108px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: flex-end; border: 1px solid var(--border); }
  .name { color: var(--soft-white); font-weight: 600; font-size: 14px; }
  .hex { color: var(--cool-gray); font-family: var(--font-mono); font-size: 12px; margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background: var(--midnight-black);"><span class="name">Midnight Black</span><span class="hex">#0A0A0F</span></div>
    <div class="sw" style="background: var(--deep-indigo);"><span class="name">Deep Indigo</span><span class="hex">#121826</span></div>
    <div class="sw" style="background: var(--deep-slate);"><span class="name">Deep Slate</span><span class="hex">#1F2937</span></div>
  </div>
</body>
</html>
