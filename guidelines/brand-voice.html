<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 28px; background: var(--midnight-black); font-family: var(--font-display); box-sizing: border-box; }
  .line { color: var(--soft-white); font-size: 30px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.18; }
  .line .cy { color: var(--neon-cyan); }
  .line .vi { color: var(--electric-violet); }
  .sub { font-family: var(--font-body); font-size: 14px; color: var(--cool-gray); margin-top: 16px; line-height: 1.5; max-width: 560px; }
</style>
</head>
<body>
  <div class="line">Be the answer.<br/>If you're not <span class="cy">cited</span>, you're <span class="vi">invisible</span>.</div>
  <div class="sub">Short, declarative, AI-native. We say "you," not "users." No exclamation marks, no emoji — confidence carries the energy.</div>
</body>
</html>
