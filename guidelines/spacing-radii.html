<!-- @dsCard group="Spacing" viewport="700x170" name="Corner Radii" subtitle="4 → 24 px, plus pill — measured, techy" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--bg-surface); font-family: var(--font-mono); }
  .row { display: flex; gap: 18px; align-items: flex-start; }
  .col { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 70px; height: 70px; background: var(--deep-slate); border: 1px solid var(--border-brand); }
  .lbl { font-size: 11px; color: var(--cool-gray); }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="border-radius: var(--radius-xs)"></div><span class="lbl">xs · 4</span></div>
    <div class="col"><div class="box" style="border-radius: var(--radius-sm)"></div><span class="lbl">sm · 8</span></div>
    <div class="col"><div class="box" style="border-radius: var(--radius-md)"></div><span class="lbl">md · 12</span></div>
    <div class="col"><div class="box" style="border-radius: var(--radius-lg)"></div><span class="lbl">lg · 16</span></div>
    <div class="col"><div class="box" style="border-radius: var(--radius-xl)"></div><span class="lbl">xl · 24</span></div>
    <div class="col"><div class="box" style="border-radius: var(--radius-pill)"></div><span class="lbl">pill</span></div>
  </div>
</body>
</html>
